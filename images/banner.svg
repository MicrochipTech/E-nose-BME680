<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 160" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E87722"/>
      <stop offset="100%" style="stop-color:#78BE20"/>
    </linearGradient>
  </defs>

  <!-- Plain white background -->
  <rect width="900" height="160" fill="#FFFFFF"/>
  <rect x="0" y="155" width="900" height="5" fill="url(#accent)"/>

  <!-- Decorative circuit-like lines -->
  <path d="M0 80 L40 80 L55 65 L100 65 L115 80 L170 80" stroke="#D0D8E0" stroke-width="1" fill="none"/>
  <path d="M0 110 L60 110 L75 125 L130 125 L145 110 L190 110" stroke="#D0D8E0" stroke-width="1" fill="none"/>
  <path d="M720 50 L760 50 L775 65 L830 65 L845 50 L900 50" stroke="#D0D8E0" stroke-width="1" fill="none"/>
  <path d="M740 110 L790 110 L805 95 L860 95 L875 110 L900 110" stroke="#D0D8E0" stroke-width="1" fill="none"/>

  <!-- Dots -->
  <circle cx="40" cy="80" r="3" fill="#0077C8"/>
  <circle cx="115" cy="80" r="3" fill="#0077C8"/>
  <circle cx="75" cy="125" r="3" fill="#00B5E2"/>
  <circle cx="775" cy="65" r="3" fill="#0077C8"/>
  <circle cx="845" cy="50" r="3" fill="#00B5E2"/>
  <circle cx="805" cy="95" r="3" fill="#0077C8"/>

  <!-- Main title -->
  <text x="450" y="55" text-anchor="middle" fill="#1B365D" font-size="32" font-weight="700">BME680 Electronic Nose</text>

  <!-- Subtitle -->
  <text x="450" y="82" text-anchor="middle" fill="#5A6E80" font-size="14">On-device odor classification using a single gas sensor and a decision tree</text>

  <!-- Tags -->
  <rect x="255" y="100" width="72" height="24" rx="12" fill="#F0F4F8" stroke="#0077C8" stroke-width="1"/>
  <text x="291" y="116" text-anchor="middle" fill="#0077C8" font-size="10" font-weight="600">SAMD51</text>

  <rect x="337" y="100" width="72" height="24" rx="12" fill="#F0F4F8" stroke="#00843D" stroke-width="1"/>
  <text x="373" y="116" text-anchor="middle" fill="#00843D" font-size="10" font-weight="600">&lt;1 KB</text>

  <rect x="419" y="100" width="80" height="24" rx="12" fill="#F0F4F8" stroke="#E87722" stroke-width="1"/>
  <text x="459" y="116" text-anchor="middle" fill="#E87722" font-size="10" font-weight="600">90.3% F1</text>

  <rect x="509" y="100" width="80" height="24" rx="12" fill="#F0F4F8" stroke="#7A2182" stroke-width="1"/>
  <text x="549" y="116" text-anchor="middle" fill="#7A2182" font-size="10" font-weight="600">No Cloud</text>

  <rect x="599" y="100" width="72" height="24" rx="12" fill="#F0F4F8" stroke="#00B5E2" stroke-width="1"/>
  <text x="635" y="116" text-anchor="middle" fill="#0077C8" font-size="10" font-weight="600">~10s</text>
</svg>
